<div class="control-grid">
  <label>
    Detector
    <select name="detector" id="detector">
      <option value="insightface" {% if detector != 'haar' %}selected{% endif %}>InsightFace</option>
      <option value="haar" {% if detector == 'haar' %}selected{% endif %}>Haar fallback</option>
    </select>
  </label>
  <label>
    Detection threshold <output id="detOut">{{ detection_threshold or 0.5 }}</output>
    <input id="detSlider" type="range" name="detection_threshold" min="0.1" max="0.9" step="0.05" value="{{ detection_threshold or 0.5 }}">
  </label>
  <label>
    Recognition threshold <output id="recOut">{{ recognition_threshold or 0.45 }}</output>
    <input id="recSlider" type="range" name="recognition_threshold" min="0.2" max="0.8" step="0.05" value="{{ recognition_threshold or 0.45 }}">
  </label>
</div>
